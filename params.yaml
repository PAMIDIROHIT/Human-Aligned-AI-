# ============================================================
# RLHF Pipeline — Centralized Hyperparameters
# All training scripts read from this file via yaml.safe_load
# ============================================================
# TARGET HARDWARE: 4× Tesla K80 (11 GB each, CC 3.7)
# PyTorch 1.12.1+cu113  |  transformers 4.38.2  |  TRL 0.7.11
# Training mode: fp32 (no quantization, no fp16 — K80 lacks tensor cores)
# ============================================================

# ---- Global ----
global:
  seed: 42
  base_model: "TinyLlama/TinyLlama-1.1B-intermediate-step-1431k-3T"
  max_seq_length: 512
  mlflow_tracking_uri: "http://localhost:5000"

# ---- Local Dataset Paths ----
data:
  sft_primary: "data/sft/ultrachat_200k"
  sft_supplement: "data/sft/openassistant_guanaco"
  reward_primary: "data/reward/anthropic_hh_rlhf"
  reward_supplement: "data/reward/ultrafeedback_binarized"
  ppo_primary: "data/ppo/ultrafeedback_binarized_gen"
  ppo_safety: "data/ppo/pku_saferlhf"

# ---- Stage 1: Supervised Fine-Tuning (LoRA, fp32) ----
sft:
  dataset: "local"  # loads from data.sft_primary + data.sft_supplement
  output_dir: "models/sft_adapter"
  experiment_name: "rlhf-sft"

  # LoRA config (no quantization — pure LoRA on fp32 base)
  lora:
    r: 64
    lora_alpha: 16
    target_modules: ["q_proj", "v_proj"]
    lora_dropout: 0.05
    bias: "none"
    task_type: "CAUSAL_LM"

  # Training arguments (fp32, K80 batch sizes)
  training:
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8
    warmup_ratio: 0.03
    num_train_epochs: 3
    learning_rate: 2.0e-4
    fp16: false
    logging_steps: 10
    save_strategy: "epoch"
    evaluation_strategy: "epoch"
    packing: true
    optim: "adamw_torch"
    weight_decay: 0.001
    max_grad_norm: 0.3
    lr_scheduler_type: "cosine"
    gradient_checkpointing: true
    dataloader_num_workers: 2

  # Evaluation gate
  eval_gate:
    max_perplexity: 15.0
    val_split_ratio: 0.1

# ---- Stage 2: Reward Model (Bradley-Terry) ----
reward_model:
  dataset: "local"  # loads from data.reward_primary + data.reward_supplement
  output_dir: "models/reward_model"
  experiment_name: "rlhf-reward-model"

  # Model config
  model:
    freeze_layers_except_last_n: 2
    reward_head_hidden_size: null  # auto from model config

  # Training arguments (fp32, K80 batch sizes)
  training:
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 2
    num_train_epochs: 1
    learning_rate: 1.0e-5
    warmup_steps: 100
    fp16: false
    logging_steps: 10
    save_strategy: "epoch"
    evaluation_strategy: "steps"
    eval_steps: 200
    optim: "adamw_torch"
    weight_decay: 0.01
    max_grad_norm: 1.0
    lr_scheduler_type: "linear"
    max_length: 512
    gradient_checkpointing: true

  # Evaluation gate
  eval_gate:
    min_accuracy: 0.60
    min_reward_margin_ratio: 0.60

# ---- Stage 3: PPO Policy Optimization ----
ppo:
  dataset: "local"  # loads from data.ppo_primary + data.ppo_safety
  output_dir: "models/ppo_policy"
  experiment_name: "rlhf-ppo"

  # PPO config (reduced batch sizes for 4× K80)
  config:
    learning_rate: 1.41e-5
    batch_size: 16
    mini_batch_size: 4
    gradient_accumulation_steps: 2
    optimize_cuda_cache: true
    early_stopping: true
    target_kl: 0.1
    kl_penalty: "kl"
    use_score_scaling: true
    use_score_norm: true
    ppo_epochs: 4
    cliprange: 0.2
    cliprange_value: 0.2
    vf_coef: 0.1
    max_grad_norm: 0.5

  # Generation config
  generation:
    max_new_tokens: 128
    temperature: 0.7
    top_k: 0
    top_p: 1.0
    do_sample: true

  # KL controller
  kl_controller:
    init_kl_coef: 0.2
    target_kl: 0.1
    horizon: 10000
    kl_lr: 0.1  # PID learning rate for KL coef

  # GAE
  gae:
    gamma: 1.0
    lam: 0.95

  # Training loop
  training:
    total_steps: 2000
    log_every_n_steps: 10
    save_every_n_steps: 500
    eval_every_n_steps: 100

  # Evaluation gate
  eval_gate:
    max_kl: 0.15
    min_reward_improvement: 0.1

# ---- Evaluation ----
evaluation:
  mt_bench_questions_path: "data/mt_bench_questions.json"
  output_path: "reports/mt_bench_scores.json"
  kl_reward_plot_path: "reports/kl_reward_tradeoff.png"
  judge_model: "gpt-4"
  num_questions: 80
  categories:
    - writing
    - roleplay
    - reasoning
    - math
    - coding
    - extraction
    - stem
    - humanities

# ---- Prometheus Metrics (remote scraping from laptop) ----
monitoring:
  # Metrics HTTP endpoint on GPU server (exposed for laptop to scrape)
  metrics_port: 9091
  # Prometheus runs on your laptop, NOT on this GPU server
  # Configure laptop prometheus.yml to scrape <gpu_server_ip>:9091
