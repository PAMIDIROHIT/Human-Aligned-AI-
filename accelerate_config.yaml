# Accelerate configuration for Tesla K80 GPUs (accelerate 0.27.2)
# GPU 0 has ~5GB used by another process, so we use GPUs 1,2,3
# Use with: accelerate launch --config_file accelerate_config.yaml <script>
compute_environment: LOCAL_MACHINE
distributed_type: MULTI_GPU
downcast_bf16: 'no'
gpu_ids: 1,2,3
machine_rank: 0
mixed_precision: 'no'
num_machines: 1
num_processes: 3
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
