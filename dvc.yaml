stages:
  stage1_sft:
    cmd: accelerate launch --config_file accelerate_config.yaml -m src.stage1_sft.train --config params.yaml
    deps:
      - src/stage1_sft/train.py
      - src/stage1_sft/dataset.py
      - data/sft/ultrachat_200k
      - data/sft/openassistant_guanaco
      - params.yaml
    params:
      - sft
      - global
    outs:
      - models/sft_adapter:
          cache: true
    metrics:
      - reports/sft_metrics.json:
          cache: false
    plots:
      - reports/sft_loss_curve.csv:
          cache: false
          x: step
          y: loss

  stage1_eval:
    cmd: python -m src.stage1_sft.evaluate --config params.yaml
    deps:
      - src/stage1_sft/evaluate.py
      - models/sft_adapter
      - params.yaml
    params:
      - sft.eval_gate
      - global
    metrics:
      - reports/sft_eval_metrics.json:
          cache: false

  stage2_reward:
    cmd: accelerate launch --config_file accelerate_config.yaml -m src.stage2_reward.train --config params.yaml
    deps:
      - src/stage2_reward/train.py
      - src/stage2_reward/dataset.py
      - src/stage2_reward/model.py
      - data/reward/anthropic_hh_rlhf
      - data/reward/ultrafeedback_binarized
      - models/sft_adapter
      - params.yaml
    params:
      - reward_model
      - global
    outs:
      - models/reward_model:
          cache: true
    metrics:
      - reports/rm_metrics.json:
          cache: false

  stage2_eval:
    cmd: python -m src.stage2_reward.evaluate --config params.yaml
    deps:
      - src/stage2_reward/evaluate.py
      - models/reward_model
      - params.yaml
    params:
      - reward_model.eval_gate
      - global
    metrics:
      - reports/rm_eval_metrics.json:
          cache: false

  stage3_ppo:
    cmd: python -m src.stage3_ppo.train --config params.yaml
    deps:
      - src/stage3_ppo/train.py
      - src/stage3_ppo/dataset.py
      - src/stage3_ppo/kl_controller.py
      - data/ppo/ultrafeedback_binarized_gen
      - data/ppo/pku_saferlhf
      - models/sft_adapter
      - models/reward_model
      - params.yaml
    params:
      - ppo
      - global
    outs:
      - models/ppo_policy:
          cache: true
    metrics:
      - reports/ppo_metrics.json:
          cache: false
    plots:
      - reports/ppo_training_curves.csv:
          cache: false
          x: step
          y: mean_reward

  stage3_eval:
    cmd: python -m src.stage3_ppo.evaluate --config params.yaml
    deps:
      - src/stage3_ppo/evaluate.py
      - models/ppo_policy
      - params.yaml
    params:
      - ppo.eval_gate
      - global
    metrics:
      - reports/ppo_eval_metrics.json:
          cache: false

  evaluate:
    cmd: python -m src.evaluation.mt_bench --config params.yaml
    deps:
      - src/evaluation/mt_bench.py
      - src/evaluation/kl_reward_tradeoff.py
      - models/ppo_policy
      - models/sft_adapter
      - params.yaml
    params:
      - evaluation
      - global
    metrics:
      - reports/mt_bench_scores.json:
          cache: false
    plots:
      - reports/kl_reward_tradeoff.png:
          cache: false
