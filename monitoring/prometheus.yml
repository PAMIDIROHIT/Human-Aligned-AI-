# Prometheus Configuration for RLHF Pipeline Remote Monitoring
# Deploy this file on your LAPTOP's Prometheus instance.
#
# SETUP: You need an SSH tunnel from your laptop to the GPU server:
#   ssh -L 9091:localhost:9091 -L 5000:localhost:5000 mohanganesh@10.0.24.7
#
# Then run Prometheus on your laptop:
#   prometheus.exe --config.file=prometheus.yml
#
# Prometheus scrapes localhost ports which are tunneled to the GPU server.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # RLHF Training Metrics (tunneled via SSH from GPU server port 9091)
  - job_name: "rlhf-training"
    static_configs:
      - targets: ["localhost:9091"]
        labels:
          instance: "campus-gpu-server"
          project: "rlhf-pipeline"

  # MLflow Server (tunneled via SSH from GPU server port 5000)
  - job_name: "mlflow"
    static_configs:
      - targets: ["localhost:5000"]
        labels:
          instance: "campus-gpu-server"
          service: "mlflow"
    metrics_path: /metrics
    scrape_interval: 30s
